site_name: ECG SQI Fusion
site_url: https://Sanssssssssssssssss.github.io/ecg_sqi_fusion/
site_description: Reproduction and extension of classical ECG signal-quality assessment.
site_author: Chang Xu
copyright: Chang Xu, 2026. Research documentation accompanying the submitted project.

theme:
  name: material
  font:
    text: IBM Plex Sans
    code: IBM Plex Mono
  palette:
    scheme: default
    primary: blue
    accent: blue
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.instant
    - navigation.top
    - navigation.path
    - navigation.tracking
    - toc.follow
    - content.code.copy
    - search.highlight
    - search.suggest

nav:
  - Home: index.md
  - Start Here:
      - Quick Start: quickstart.md
      - Inference and Docker: inference.md
  - Scientific Context:
      - Background: science_background.md
      - Methods: methods.md
      - Findings: findings.md
      - Limitations: limitations.md
  - Reproduction:
      - Reproduction Guide: reproduction.md
      - Data Availability: data_availability.md
      - Troubleshooting: troubleshooting.md
  - Reference:
      - Model Catalogue: models.md
      - CLI Reference: cli_reference.md
      - Python API: api_reference.md
      - Code Architecture: code_architecture.md
      - wfdb-qrs-kit: wfdb_qrs_kit.md
      - Bibliography: references.md
  - Project Record:
      - Report: report.md
      - Executive Summary: executive_summary.md
      - Tests and CI: tests_ci.md
      - AI Tool Use: ai_use.md
  - Archive:
      - Gap-Fill Method: data_v1_gapfill_method.md
      - Fit Report: data_v1_fit_report.md
      - E31 Comparison: e31_wave_mechanism_conformer_comparison.md
  - GitHub: https://github.com/Sanssssssssssssssss/ecg_sqi_fusion

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths: [.]
          options:
            docstring_style: google
            heading_level: 2
            members_order: source
            show_root_heading: true
            show_source: true
            show_signature_annotations: true
            separate_signature: true

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true

extra_css:
  - stylesheets/academic.css

extra_javascript:
  - javascripts/mathjax.js
  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js
